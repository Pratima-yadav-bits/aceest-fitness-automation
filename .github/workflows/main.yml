name: Flask CI/CD Pipeline

# Trigger pipeline on push or pull_request to main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint pytest requests

      # Step 4: Lint code (syntax & style check)
      - name: Lint Python code
        run: |
          pylint *.py

      # Step 5: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t aceest-gym:latest .

      # Step 6: Run Pytest inside Docker
      - name: Run Pytest inside Docker container
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app aceest-gym:latest pytest tests/test_app.py